<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SNAP'N SPIN POPUP with SPINNIES</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: sans-serif;
}

body {
  background: linear-gradient(
    90deg,
    rgba(157,196,225,0.35),
    rgba(238,197,213,0.35),
    rgba(241,218,138,0.35),
    rgba(242,152,153,0.35),
    rgba(224,175,201,0.35),
    rgba(195,214,113,0.35)
  );
  background-attachment: fixed;
}

.main {
  padding: 12px;
}

/* ===== 合計バー（前ページと同じ） ===== */
.summary-fixed {
  position: sticky;
  top: 0;
  left: 0;
  right: 0;

  background: #fff;
  border-bottom: 2px solid #84c1b1;

  padding: 10px 16px;

  display: flex;
  justify-content: space-between;
  align-items: center;

  z-index: 10;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.save-btn{
  background:#84c1b1;
  color:#fff;
  border:none;
  padding:8px 14px;
}

.reset-btn{
  background:#e57373;
  color:#fff;
  border:none;
  padding:8px 14px;
}

/* ===== 商品 ===== */

h2 {
  margin-top: 24px;
  font-size: 18px;
  border-left: 4px solid #84c1b1;
  padding-left: 8px;
}

.item {
  display: flex;
  justify-content: space-between; /* ←追加 */
  align-items: center;
  padding: 16px 0;
  border-bottom: 1px solid #ddd;
}

.label {
  flex: 1;
  font-size: 16px; /* ←少し大きく */
}

.price {
  font-size: 14px;
  color: #555;
  margin-left: 8px;
}

input {
  width: 40px;
  text-align: center;
  font-size: 16px;
}

.qty-btn {
  width: 36px;
  height: 36px;
}

/* ===== 下部エリア ===== */

.creator {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  font-size: 11px;
  color: #666;
  margin-top: 16px;
  margin-bottom: 32px;
  padding: 8px;
}

.creator-link {
  display: inline-flex;
  align-items: center;
  text-decoration: none;
  color: inherit;
  gap: 4px;
}

.creator-link svg {
  width: 14px;
  height: 14px;
  fill: currentColor;
}

.home-back {
  margin: 24px 0;
  text-align: center;
}

.home-link {
  display: inline-block;
  padding: 10px 18px;
  border-radius: 999px;
  background-color: #84c1b1;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
}

.home-link:hover {
  opacity: 0.85;
}
</style>
</head>

<body>

<!-- 合計バー -->
<div class="summary-fixed">
  <div>
    合計：<span id="totalQty">0</span>点 /
    ¥<span id="totalPrice">0</span><br>
    特典：<span id="bonusCount">0</span>個 /
    抽選：<span id="lotteryCount">0</span>回
  </div>

  <div style="display:flex; gap:8px;">
    <button class="save-btn" onclick="saveImage()">画像で保存</button>
    <button class="reset-btn" onclick="resetAll()">リセット</button>
  </div>
</div>

<div class="main" id="captureArea">

<h2>■ランダム商品</h2>
<div id="random_items"></div>

<h2>■オープン商品</h2>
<h3>証明写真風ステッカー</h3>
<div id="op1"></div>

<h3>「SPINNIES」スタンド</h3>
<div id="op2"></div>

<h3>ぬいぐるみ</h3>
<div id="op3"></div>

<h3>フォトカードセット</h3>
<div id="photocard"></div>

<h3>カラフルグミ</h3>
<div id="gumi"></div>

<h3>コーヒーラスク</h3>
<div id="rusk"></div>

<h3>クリアポーチ&メモセット</h3>
<div id="pouch"></div>

<h2>■単品商品</h2>
<div id="heart"></div>
<div id="rare_nui"></div>
<div id="rare_key"></div>

</div>
</div>

<script>

/* 価格 */

const PRICE={
random_badge:660,
random_card:550,
random_stand:550,
op1:660,
op2:1210,
op3:2750,
gumi:1320,
rusk:1080,
pouch:1540,
heart:935,
rare_nui:2420,
rare_key:1980
};

const PHOTO_PRICE={
"本部":1650,
"交際部":1980,
"管理部":1650,
"強行部":1980,
"交渉部":1650,
"特務部":1980
};

const CHARACTERS=[
"皇坂","城瀬","須王","綾戸","宇京","樋宮","環野","槻本",
"壱川","隠岐谷","節見","御門","新開","相沢","在間",
"祠堂","立科","恩田","新名","神家","麻波"
];

const GROUP3 = [
"本部・交際部",
"管理部・強行部",
"交渉部・特務部"
];

/* 生成 */

function createSingle(target,id,name,price){
document.getElementById(target).innerHTML+=`
<div class="item">
<div class="label">${name}<span class="price">¥${price}</span></div>
<button class="qty-btn" onclick="changeQty('${id}',-1)">−</button>
<input id="${id}" type="number" value="0" min="0" oninput="calc()">
<button class="qty-btn" onclick="changeQty('${id}',1)">＋</button>
</div>`;
}

function createGroup(target,prefix,price){
CHARACTERS.forEach(c=>{
createSingle(target,`${prefix}_${c}`,c,price);
});
}

function createGroup3(target,prefix,price){
GROUP3.forEach(g=>{
createSingle(target,`${prefix}_${g}`,g,price);
});
}

function createPhoto(){
Object.keys(PHOTO_PRICE).forEach(dep=>{
createSingle("photocard","photo_"+dep,dep,PHOTO_PRICE[dep]);
});
}

function createGumi(){
Object.keys(PHOTO_PRICE).forEach(dep=>{
createSingle("gumi","gumi_"+dep,dep,PRICE.gumi);
});
}

/* 計算 */

function changeQty(id,diff){
const el=document.getElementById(id);
el.value=Math.max(0,Number(el.value)+diff);
calc();
}

function calc(){
let qty=0;
let total=0;

document.querySelectorAll("input").forEach(el=>{
const v=Math.max(0,Number(el.value)||0);
if(!v)return;
qty+=v;

if(PRICE[el.id]) total+=v*PRICE[el.id];
else if(el.id.startsWith("op1_")) total+=v*PRICE.op1;
else if(el.id.startsWith("op2_")) total+=v*PRICE.op2;
else if(el.id.startsWith("op3_")) total+=v*PRICE.op3;
else if(el.id.startsWith("gumi_")) total+=v*PRICE.gumi;
else if(el.id.startsWith("rusk_")) total+=v*PRICE.rusk;
else if(el.id.startsWith("pouch_")) total+=v*PRICE.pouch;
else if(el.id.startsWith("photo_")){
const dep=el.id.replace("photo_","");
total+=v*PHOTO_PRICE[dep];
}
});

totalQty.textContent=qty;
totalPrice.textContent=total.toLocaleString();
lotteryCount.textContent= total>=3000?1:0;
bonusCount.textContent= total>=6000?1:0;
}

/* 保存 */

function saveImage(){

  let selected = [];

  document.querySelectorAll(".item").forEach(item=>{
    const input = item.querySelector("input");
    const qty = Number(input.value);
    if(qty > 0){
      const name = item.querySelector(".label").childNodes[0].textContent.trim();
      const priceText = item.querySelector(".price").textContent;
      selected.push(`${name} ×${qty} ${priceText}`);
    }
  });

  if(selected.length === 0){
    alert("商品が選択されていません");
    return;
  }

  const temp = document.createElement("div");
  temp.style.display = "inline-block";
  temp.style.padding = "40px";
  temp.style.background = "#fff";
  temp.style.fontFamily = "sans-serif";
  temp.style.color = "#000";
  temp.style.lineHeight = "1.6";

  temp.innerHTML = `
    <div style="font-size:22px;font-weight:bold;margin-bottom:10px;">
      SNAP'N SPIN POPUP<br>with SPINNIES
    </div>

    <div style="border-top:2px solid #000;margin:15px 0;"></div>

    ${selected.map(s=>`<div style="margin-bottom:6px;">${s}</div>`).join("")}

    <div style="border-top:2px solid #000;margin:20px 0;"></div>

    <div style="display:flex;justify-content:space-between;font-weight:bold;font-size:18px;">
      <div>点数：${totalQty.textContent}点</div>
      <div>特典：${bonusCount.textContent}回</div>
    </div>

    <div style="display:flex;justify-content:space-between;font-weight:bold;font-size:18px;margin-top:8px;">
      <div>金額：¥${totalPrice.textContent}</div>
      <div>抽選：${lotteryCount.textContent}回</div>
    </div>
  `;

  document.body.appendChild(temp);

  html2canvas(temp).then(canvas=>{
    const link=document.createElement("a");
    link.download="SNAP'N SPIN POPUP with SPINNIES.png";
    link.href=canvas.toDataURL();
    link.click();
    document.body.removeChild(temp);
  });
}

function resetAll(){
if(!confirm("全てリセットしますか？"))return;
document.querySelectorAll("input").forEach(el=>el.value=0);
calc();
}

/* 初期化 */

/* 初期化 */

createSingle("random_items","random_badge","アクリルおなまえバッジ",PRICE.random_badge);
createSingle("random_items","random_card","クリアカード",PRICE.random_card);
createSingle("random_items","random_stand","セリフアクリルスタンド",PRICE.random_stand);

createGroup("op1","op1",PRICE.op1);
createGroup("op2","op2",PRICE.op2);
createGroup("op3","op3",PRICE.op3);

createPhoto();
createGumi();

createGroup3("rusk","rusk",PRICE.rusk);
createGroup3("pouch","pouch",PRICE.pouch);

createSingle("heart","heart","ミニハートチョコ",PRICE.heart);
createSingle("rare_nui","rare_nui","ぬいぐるみ レア",PRICE.rare_nui);
createSingle("rare_key","rare_key","ぬいぐるみキーホルダー レア",PRICE.rare_key);

calc();

</script>
